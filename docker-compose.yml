services:
  # Live tracker (tournament day)
  tracker:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=${TZ:-America/Toronto}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./logs:/app/logs
    restart: unless-stopped

  # Step through mock tournament (default: no push, view at localhost:8000)
  #   podman-compose run mock-test                    # local only
  #   podman-compose run mock-test --push             # push to GitHub Pages
  mock-test:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=${TZ:-America/Toronto}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./test:/app/test
      - ./logs:/app/logs
    command: ["--mock-dir", "test/mock_responses", "--once", "--skip-push"]
    profiles: ["test"]

  # Reset mock to step 0 (default: no push)
  #   podman-compose run mock-reset                   # local only
  #   podman-compose run mock-reset --push            # push to GitHub Pages
  mock-reset:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=${TZ:-America/Toronto}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./test:/app/test
      - ./logs:/app/logs
    command: ["--mock-dir", "test/mock_responses", "--mock-reset", "--once", "--skip-push"]
    profiles: ["test"]
