services:
  tracker:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./logs:/app/logs
    restart: unless-stopped

  # Step through mock tournament (run with: podman-compose run mock-test)
  mock-test:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./test:/app/test
      - ./logs:/app/logs
    command: ["--mock-dir", "test/mock_responses", "--once"]
    profiles: ["test"]

  # Reset mock simulation to step 0 (run with: podman-compose run mock-reset)
  mock-reset:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-Rangers Tracker Bot}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-tracker@example.com}
    volumes:
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.git-credentials:/root/.git-credentials:ro
      - ./.git:/app/.git
      - ./data:/app/data
      - ./docs:/app/docs
      - ./test:/app/test
      - ./logs:/app/logs
    command: ["--mock-dir", "test/mock_responses", "--mock-reset", "--once"]
    profiles: ["test"]
